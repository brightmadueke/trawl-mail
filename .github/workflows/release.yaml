name: 'publish'
on:
  push:
    branches:
      - main # Change this to your active development branch if it is different

# Global permissions override to force GitHub to allow tag and release creation
permissions:
  contents: write
  repository-projects: write

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin' # Compiles a single installer for Intel and Apple Silicon
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Targets required for cross-compiling the macOS universal binary
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install macOS DMG packager
        if: matrix.platform == 'macos-latest'
        run: brew install create-dmg

      - name: install frontend dependencies
        run: npm ci

      - name: build frontend and tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Must remain under env block
        with:
          tagName: app-v__VERSION__ # Must remain under with block
          releaseName: 'App v__VERSION__'
          releaseBody: 'See the assets below to download.'
          releaseDraft: true # Change to false if you want the release public immediately
          prerelease: false
          args: ${{ matrix.args }}
