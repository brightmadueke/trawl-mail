name: 'publish'
on:
  push:
    branches:
      - main # Or change to your active development branch

jobs:
  publish-tauri:
    permissions:
      contents: write # Crucial permission for creating Draft Releases
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest' # Universal macOS build configurations
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04' # Tauri v2 production target Linux engine
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm' # Automates global npm package caching to save time

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install frontend dependencies
        run: npm ci # 'npm ci' ensures clean, deterministic dependency resolution

      - name: build frontend and tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__ # Replaces automatically with version from package.json
          releaseName: 'App v__VERSION__'
          releaseBody: 'See the assets below to download.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
